<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gin Rummy</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<!-- ── Header ── -->
<div class="app-header">
    <h1>♣ Gin <span>Rummy</span> ♠</h1>
    <button class="theme-toggle" onclick="toggleTheme()" title="Toggle theme">🌙</button>
</div>

<!-- ── Lobby ── -->
<div id="lobby">
    <div class="lobby-section">
        <h2>Create a new game</h2>
        <div class="lobby-row">
            <input id="nameInput" placeholder="Your name" />
            <button class="accent" onclick="createGame()">Create Game</button>
        </div>
    </div>
    <hr class="lobby-divider">
    <div class="lobby-section">
        <h2>Join existing game</h2>
        <div class="lobby-row">
            <input id="joinCode" placeholder="Game code" />
            <input id="joinName" placeholder="Your name" />
            <button class="accent" onclick="joinGame()">Join Game</button>
        </div>
    </div>
</div>

<!-- ── Game Table ── -->
<div id="game">

    <!-- Opponent Zone -->
    <div id="opponent-zone">
        <div class="zone-header">
            <span class="zone-name" id="opponentName">Opponent</span>
            <span class="zone-score" id="opponentScore">0 pts</span>
        </div>
        <div id="opponent-hand"></div>
    </div>

    <!-- Table Center -->
    <div id="table-center">
        <div class="pile-group">
            <img id="stockImg" class="stock-back"
                 src="https://deckofcardsapi.com/static/img/back.png"
                 alt="Stock" onclick="drawCard('stock')" />
            <div class="pile-label">Stock (<span id="stockCount">0</span>)</div>
        </div>

        <div id="status">Waiting...</div>

        <div class="pile-group">
            <div id="discardContainer">
                <div class="empty-pile">—</div>
            </div>
            <div class="pile-label">Discard</div>
        </div>
    </div>

    <!-- Your Zone -->
    <div id="your-zone">
        <div class="zone-header">
            <span class="zone-name" id="yourName">You</span>
            <span class="zone-score" id="yourScore">0 pts</span>
        </div>
        <div id="hand"></div>
        <div id="actions">
            <button id="btnDiscard" class="accent" onclick="discardSelected()" disabled>Discard Selected</button>
            <button id="btnKnock" onclick="openKnockModal()" disabled>Knock</button>
        </div>
        <div id="log"></div>
    </div>

</div>

<!-- ── Knock Modal ── -->
<div id="knockModal">
    <div class="modal-box">
        <h2>Declare Melds</h2>
        <p>Enter each meld as comma-separated cards (e.g. <code>AH,AS,AD</code>), one meld per line.</p>
        <textarea id="meldInput" rows="5"></textarea>
        <div class="modal-actions">
            <button class="accent" onclick="submitKnock()">Confirm Knock</button>
            <button onclick="closeKnockModal()">Cancel</button>
        </div>
    </div>
</div>

<script>
    // ── Theme ──
    const html = document.documentElement;
    const toggleBtn = document.querySelector('.theme-toggle');

    function applyTheme(theme) {
        html.setAttribute('data-theme', theme);
        toggleBtn.textContent = theme === 'dark' ? '🌙' : '☀️';
        localStorage.setItem('gr-theme', theme);
    }

    function toggleTheme() {
        applyTheme(html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
    }

    // Apply saved theme on load
    applyTheme(localStorage.getItem('gr-theme') || 'dark');

    // ── State ──
    let gameId = null;
    let myPlayer = null;
    let selectedCard = null;
    let pollInterval = null;

    // ── Card Image URL ──
    function cardImgUrl(cardStr) {
        const suit = cardStr.slice(-1);
        let rank = cardStr.slice(0, -1);
        if (rank === '10') rank = '0';
        return `https://deckofcardsapi.com/static/img/${rank}${suit}.png`;
    }

    // ── Render Your Hand ──
    function renderHand(cards) {
        const handEl = document.getElementById('hand');
        handEl.innerHTML = '';
        cards.forEach(card => {
            const img = document.createElement('img');
            img.src = cardImgUrl(card);
            img.alt = card;
            img.className = 'card-img';
            img.onclick = () => selectCard(card, img);
            handEl.appendChild(img);
        });
        selectedCard = null;
    }

    // ── Render Opponent Hand (face-down) ──
    function renderOpponentHand(count) {
        const el = document.getElementById('opponent-hand');
        el.innerHTML = '';
        for (let i = 0; i < count; i++) {
            const img = document.createElement('img');
            img.src = 'https://deckofcardsapi.com/static/img/back.png';
            img.alt = 'card back';
            img.className = 'card-back';
            el.appendChild(img);
        }
    }

    // ── Render Discard ──
    function renderDiscard(cardStr) {
        const container = document.getElementById('discardContainer');
        if (!cardStr) {
            container.innerHTML = '<div class="empty-pile">—</div>';
            return;
        }
        const img = document.createElement('img');
        img.src = cardImgUrl(cardStr);
        img.alt = cardStr;
        img.className = 'pile-card-img';
        img.onclick = () => drawCard('discard');
        container.innerHTML = '';
        container.appendChild(img);
    }

    // ── Select Card ──
    function selectCard(cardStr, el) {
        document.querySelectorAll('.card-img').forEach(c => c.classList.remove('selected'));
        if (selectedCard === cardStr) {
            selectedCard = null;
        } else {
            selectedCard = cardStr;
            el.classList.add('selected');
        }
    }

    // ── Lobby ──
    async function createGame() {
        const name = document.getElementById('nameInput').value.trim();
        if (!name) return alert('Enter your name');
        const res = await fetch('/games', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ player1_name: name })
        });
        const data = await res.json();
        gameId = data.game_id;
        myPlayer = 'player1';
        alert(`Game created! Share this code with your friend: ${gameId}`);
        startGame(data.state);
    }

    async function joinGame() {
        const code = document.getElementById('joinCode').value.trim();
        const name = document.getElementById('joinName').value.trim();
        if (!code || !name) return alert('Enter both the game code and your name');
        const res = await fetch(`/games/${code}/join`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ player2_name: name })
        });
        if (!res.ok) return alert('Could not join — check the game code');
        const data = await res.json();
        gameId = code;
        myPlayer = 'player2';
        startGame(data.state);
    }

    // ── Start & Poll ──
    function startGame(state) {
        document.getElementById('lobby').style.display = 'none';
        document.getElementById('game').style.display = 'flex';
        applyState(state);
        pollInterval = setInterval(pollState, 3000);
    }

    async function pollState() {
        const res = await fetch(`/games/${gameId}/state?player=${myPlayer}`);
        const data = await res.json();
        applyState(data.state);
    }

    // ── Apply State ──
    function applyState(state) {
        const isMyTurn = state.current_turn === myPlayer;

        // Names & scores
        document.getElementById('yourName').textContent = myPlayer === 'player1'
            ? state.player1_name : (state.player2_name || 'You');
        document.getElementById('opponentName').textContent = myPlayer === 'player1'
            ? (state.player2_name || 'Waiting for opponent...') : state.player1_name;
        document.getElementById('yourScore').textContent =
            (myPlayer === 'player1' ? state.player1_score : state.player2_score) + ' pts';
        document.getElementById('opponentScore').textContent =
            (myPlayer === 'player1' ? state.player2_score : state.player1_score) + ' pts';

        // Status
        let statusText = '';
        if (state.phase === 'waiting')        statusText = '⏳ Waiting for opponent...';
        else if (state.phase === 'playing')   statusText = isMyTurn ? '🟢 Your turn' : '⏳ Their turn';
        else if (state.phase === 'scoring')   statusText = '🃏 Hand over';
        else if (state.phase === 'finished') {
            statusText = '🏆 Game over!';
            clearInterval(pollInterval);
        }
        document.getElementById('status').textContent = statusText;

        // Piles
        document.getElementById('stockCount').textContent = state.stock_count;
        renderDiscard(state.discard_top);

        // Hands
        renderHand(state.your_hand);
        renderOpponentHand(10);

        // Buttons
        document.getElementById('btnDiscard').disabled = !(isMyTurn && state.drawn_this_turn);
        document.getElementById('btnKnock').disabled   = !(isMyTurn && state.drawn_this_turn);
    }

    // ── Draw ──
    async function drawCard(source) {
        const res = await fetch(`/games/${gameId}/draw`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ player: myPlayer, source })
        });
        const data = await res.json();
        if (res.ok) { applyState(data.state); log(`You drew from the ${source}.`); }
        else log(`⚠ ${data.detail}`);
    }

    // ── Discard ──
    async function discardSelected() {
        if (!selectedCard) return alert('Select a card to discard first');
        const res = await fetch(`/games/${gameId}/discard`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ player: myPlayer, card: selectedCard })
        });
        const data = await res.json();
        if (res.ok) { log(`You discarded ${selectedCard}.`); applyState(data.state); }
        else log(`⚠ ${data.detail}`);
    }

    // ── Knock ──
    function openKnockModal()  { document.getElementById('knockModal').style.display = 'flex'; }
    function closeKnockModal() { document.getElementById('knockModal').style.display = 'none'; }

    async function submitKnock() {
        const raw = document.getElementById('meldInput').value.trim();
        const melds = raw.length === 0 ? [] : raw.split('\n').map(line =>
            line.split(',').map(c => c.trim().toUpperCase())
        );
        const res = await fetch(`/games/${gameId}/knock`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ player: myPlayer, melds, layoffs: [] })
        });
        const data = await res.json();
        closeKnockModal();
        if (res.ok) {
            const msg = data.gin ? '🎉 GIN!' : data.undercut ? '😬 Undercut!' : '✊ Knocked!';
            log(`${msg} ${data.points_scored} pts scored by ${data.winner}.`);
            applyState(data.state);
        } else log(`⚠ ${data.detail}`);
    }

    // ── Log ──
    function log(msg) {
        const el = document.getElementById('log');
        const p = document.createElement('p');
        p.textContent = msg;
        el.prepend(p);
    }
</script>

</body>
</html>
